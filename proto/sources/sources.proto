syntax = "proto3";

package sources.v1;

option go_package = "github.com/rozoomcool/sihkaromicro/proto/sources";

import "google/protobuf/timestamp.proto";

// Sources service
service SourcesService {
  // Upload source file
  rpc UploadSource (stream UploadSourceRequest) returns (UploadSourceResponse);
  // Get source by id
  rpc GetSource (GetSourceRequest) returns (SourceResponse);
  // List all sources in project
  rpc ListSources (ListSourcesRequest) returns (ListSourcesResponse);
  // Delete source
  rpc DeleteSource (DeleteSourceRequest) returns (DeleteSourceResponse);
  // Retry job if not started
  rpc RetryJob (RetryJobRequest) returns (RetryJobResponse);

}

enum SourceType {
  SOURCE_TYPE_UNSPECIFIED = 0;
  SOURCE_TYPE_PDF         = 1;
  SOURCE_TYPE_TXT         = 2;
  SOURCE_TYPE_DOCX        = 3;
  SOURCE_TYPE_MARKDOWN    = 4;
  SOURCE_TYPE_URL         = 5;
}

enum SourceStatus {
  SOURCE_STATUS_UNSPECIFIED = 0;
  SOURCE_STATUS_UPLOADING   = 1;
  SOURCE_STATUS_UPLOADED    = 2;
  SOURCE_STATUS_PENDING     = 3;
  SOURCE_STATUS_PROCESSING  = 4;
  SOURCE_STATUS_READY       = 5;
  SOURCE_STATUS_FAILED      = 6;
}

message Source {
  int64                     id         = 1;
  int64                     project_id = 2;
  string                    owner_id   = 3;
  string                    name       = 4;
  SourceType                type       = 5;
  SourceStatus              status     = 6;
  int64                     size       = 7;
  string                    job_id     = 8;
  string                    url        = 9; // presigned URL для скачивания
  string                    error      = 10; // причина ошибки
  string                    source_url = 11; // оригинальный URL (только для SOURCE_TYPE_URL)
  google.protobuf.Timestamp created_at = 12;
  google.protobuf.Timestamp updated_at = 13;
}

// File streaming
message UploadSourceRequest {
  oneof data {
    SourceMeta meta  = 1; // первое сообщение — метаданные
    bytes      chunk = 2; // чанки файла
    bool       done  = 3; // последнее сообщение — файл передан полностью
  }
}

message SourceMeta {
  int64      project_id = 1;
  string     name       = 2;
  SourceType type       = 3;
  int64      size       = 4;
  string     source_url = 5; // только для SOURCE_TYPE_URL
}

message UploadSourceResponse {
  int64  source_id = 1;
  string job_id    = 2;
}

message GetSourceRequest {
  int64 id         = 1;
  int64 project_id = 2;
}

message SourceResponse {
  Source source = 1;
}

message ListSourcesRequest {
  int64 project_id = 1;
}

message ListSourcesResponse {
  repeated Source sources = 1;
}

message DeleteSourceRequest {
  int64 id         = 1;
  int64 project_id = 2;
}

message DeleteSourceResponse {
  bool success = 1;
}

message RetryJobRequest {
  int64 source_id  = 1;
  int64 project_id = 2;
}

message RetryJobResponse {
  string job_id = 1;
}